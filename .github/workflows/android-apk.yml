name: Build Android APK and Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform if needed
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign Release APK
        run: |
          echo "$SCI_FI_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          apksigner sign \
            --ks android/app/release.keystore \
            --ks-pass "pass:$SCI_FI_KEYSTORE_PASS" \
            --ks-key-alias "$SCI_FI_KEY_ALIAS" \
            --key-pass "pass:$SCI_FI_KEY_PASS" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/app-release.apk
        env:
          SCI_FI_KEYSTORE_BASE64: ${{ secrets.SCI_FI_KEYSTORE_BASE64 }}
          SCI_FI_KEYSTORE_PASS: ${{ secrets.SCI_FI_KEYSTORE_PASS }}
          SCI_FI_KEY_ALIAS: ${{ secrets.SCI_FI_KEY_ALIAS }}
          SCI_FI_KEY_PASS: ${{ secrets.SCI_FI_KEY_PASS }}

      - name: Define release metadata
        id: meta
        env:
          TAG: nightly
        run: |
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Sci-Fi Empfehlungen Nightly" >> "$GITHUB_OUTPUT"

      - name: Publish nightly
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$TAG" -m "$TAG" 2>/dev/null || true
          git push origin "refs/tags/$TAG" --force 2>/dev/null || true

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Sci-Fi Empfehlungen Nightly" --notes "Auto-built from latest commit" --prerelease
          else
            gh release create "$TAG" --title "Sci-Fi Empfehlungen Nightly" --notes "Auto-built from latest commit" --prerelease
          fi

          gh release upload "$TAG" \
            android/app/build/outputs/apk/debug/*.apk \
            android/app/build/outputs/apk/release/*.apk \
            --clobber
