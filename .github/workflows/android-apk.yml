name: Build Android APK and Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
  KEYSTORE_PASS: ${{ secrets.SCI_FI_KEYSTORE_PASS }}
  KEY_ALIAS: ${{ secrets.SCI_FI_KEY_ALIAS }}
  KEY_PASS: ${{ secrets.SCI_FI_KEY_PASS }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform if needed
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Debug keystore
        run: |
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          mkdir -p $RUNNER_TEMP
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.jks
          ls -lh $RUNNER_TEMP/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.SCI_FI_KEYSTORE_BASE64 }}

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Signed Release APK
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks

          cd android

          # Build with signing config inline
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS
        env:
          KEYSTORE_BASE64: ${{ secrets.SCI_FI_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.SCI_FI_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.SCI_FI_KEY_ALIAS }}

      - name: Define release metadata
        id: meta
        env:
          TAG: nightly
        run: |
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Sci-Fi Empfehlungen Nightly" >> "$GITHUB_OUTPUT"

      - name: Publish nightly
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$TAG" -m "$TAG" 2>/dev/null || true
          git push origin "refs/tags/$TAG" --force 2>/dev/null || true

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Sci-Fi Empfehlungen Nightly" --notes "Auto-built and signed from latest commit" --prerelease
          else
            gh release create "$TAG" --title "Sci-Fi Empfehlungen Nightly" --notes "Auto-built and signed from latest commit" --prerelease
          fi

          gh release upload "$TAG" \
            android/app/build/outputs/apk/debug/*.apk \
            android/app/build/outputs/apk/release/*.apk \
            --clobber
